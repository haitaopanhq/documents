---
name: Build and Publish Documents

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        project:
          - Personal
          - LandingZone
          - Keycloak
          - TechExploration
          - Observability/CN
          - Linux-K8S-OPS/CN
          - interview-qa/CN
          - interview-qa/EN
          - The-IndieDeveloper-Fullstack-Roadmap/CN
          - The-IndieDeveloper-Fullstack-Roadmap/EN
          - Solutions/CN
          - Solutions/EN
          - AI-Platform/CN
          - AI-Platform/EN
    env:
      TAG_NAME: ${{ matrix.project }}-v${{ github.run_number }}-${{ github.run_id }}
      RSYNC_SSH_KEY: ${{ secrets.RSYNC_SSH_KEY }}
      VPS_HOST: ${{ secrets.VPS_HOST }}
      RSYNC_SSH_USER: ${{ secrets.RSYNC_SSH_USER }}
      REMOTE_ROOT: ${{ secrets.REMOTE_ROOT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: .github/scripts/setup_build_env.sh

      - name: Build documents using Makefile
        run: .github/scripts/build_docs.sh
        env:
          PROJECT: ${{ matrix.project }}

      - name: Prepare artifact name
        run: .github/scripts/prepare_artifact_name.sh
        env:
          PROJECT: ${{ matrix.project }}

      - name: Upload PDF, DOCX, and HTML files to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: |
            ${{ matrix.project }}/**/*.pdf
            ${{ matrix.project }}/**/*.docx
            ${{ matrix.project }}/**/*.html
          if-no-files-found: ignore

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: Release ${{ env.TAG_NAME }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload PDF, DOCX, and HTML files to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          files: |
            ${{ matrix.project }}/**/*.pdf
            ${{ matrix.project }}/**/*.docx
            ${{ matrix.project }}/**/*.html
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


      - name: Ensure deps (rsync, ssh)
        run: .github/scripts/ensure_deps.sh

      - name: Init SSH
        run: .github/scripts/init_ssh.sh

      - name: Determine remote directories
        run: .github/scripts/determine_remote_dirs.sh
        env:
          PROJECT: ${{ matrix.project }}

      - name: Rsync release assets to remote
        run: .github/scripts/rsync_assets.sh
        env:
          PROJECT: ${{ matrix.project }}

